<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abokichi - Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/products.css">
</head>
<body>
    <div class="top-bar">
        <div>USD <i class="fas fa-chevron-down"></i> &nbsp;&nbsp; <i class="fas fa-map-marker-alt"></i> Stores</div>
        <div>Login / Register</div>
    </div>

    <header class="header-main">
        <div class="logo">
            <a href="index.html">
                <img src="./assets/images/logo.webp" alt="ABOKICHI">
            </a>
        </div>
        <nav class="main-nav" id="main-nav">
            <ul class="nav-links">
                <li><a href="products.html" style="color:var(--primary-color);">Shop <i class="fas fa-chevron-down" style="font-size:10px;"></i></a></li>
                <li><a href="#">Our story</a></li>
                <li><a href="#">Recipes</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="header-icons">
            <i class="fas fa-search"></i>
            <i class="far fa-heart"></i>
            <div class="cart-icon-container">
                <a href="#" style="color:inherit;"><i class="fas fa-shopping-bag"></i></a>
                <span class="cart-count">0</span>
            </div>
            <i class="fas fa-bars mobile-menu-btn" id="mobile-menu-btn"></i>
        </div>
    </header>

    <div class="page-header">
        <h1>PRODUCTS</h1>
    </div>

    <div class="shop-layout">
        <div class="page-title">
            <h2 id="product-count-title">Products (0)</h2>
        </div>

        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-filter" id="filter-btn">
                    <i class="fas fa-filter"></i> Filter
                </button>
                <div class="view-icons">
                    <i class="fas fa-th-large active" id="grid-view-btn" title="Grid view"></i>
                    <i class="fas fa-list" id="list-view-btn" title="List view"></i>
                </div>
            </div>
            <div class="toolbar-right">
                <span>Sort By:</span>
                <select id="sort">
                    <option value="name-asc">Alphabetically, A-Z</option>
                    <option value="name-desc">Alphabetically, Z-A</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
                <i class="fas fa-chevron-down" style="font-size:11px; color:#666;"></i>
            </div>
        </div>

        <div class="horizontal-filters" id="horizontal-filters">
            <div class="filter-column">
                <h4>Categories</h4>
                <div class="filter-options" id="category-filters"></div>
            </div>
            <div class="filter-column">
                <h4>Type</h4>
                <div class="filter-options">
                    <label><input type="checkbox" name="type" value="Single Pack"> Single Pack</label>
                    <label><input type="checkbox" name="type" value="Multi Set"> Multi Set</label>
                </div>
            </div>
            <div class="filter-column">
                <h4>Flavours</h4>
                <div class="filter-options">
                    <label><input type="checkbox" name="flavour" value="Spicy"> Spicy</label>
                    <label><input type="checkbox" name="flavour" value="Mild"> Mild</label>
                </div>
            </div>
            <div class="filter-column">
                <h4>Rating</h4>
                <div class="filter-options">
                    <label><input type="checkbox" name="rating" value="5"> 5 Stars</label>
                    <label><input type="checkbox" name="rating" value="4"> 4 Stars & above</label>
                    <label><input type="checkbox" name="rating" value="3"> 3 Stars & above</label>
                </div>
            </div>
        </div>

        <div class="product-grid" id="main-product-grid"></div>
    </div>
   <footer>
    <div class="footer-content">
        <div class="footer-section">
            <ul>
                <li><a href="#">About us</a></li>
                <li><a href="#">Contact us</a></li>
                <li><a href="#">Customer Service</a></li>
                <li><a href="#">FAQs</a></li>
                <li><a href="#">Sitemap</a></li>
            </ul>
        </div>
        <div class="footer-section">
            <ul>
                <li><a href="#">Terms of Service</a></li>
                <li><a href="#">Refund policy</a></li>
                <li><a href="#">Press</a></li>
            </ul>
        </div>
        <div class="footer-section footer-payments">
            <img src="./assets/images/visa.webp" alt="Visa" loading="lazy">
            <img src="./assets/images/apple-pay.webp" alt="Apple Pay" loading="lazy">
            <img src="./assets/images/american-express.jpg" alt="American Express" loading="lazy">
        </div>
    </div>
    <div class="footer-bottom">
        <div class="footer-social">
            <i class="fa-brands fa-facebook"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-youtube"></i>
            <i class="fab fa-pinterest"></i>
            <i class="fab fa-linkedin-in"></i>
        </div>
        <p>&copy; 2021 Abokichi.</p>
    </div>
</footer>

    <script src="js/script.js"></script>
    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            document.getElementById('main-nav').classList.toggle('active');
        });

        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('main-product-grid');
            const categoryContainer = document.getElementById('category-filters');
            const sortSelect = document.getElementById('sort');
            const filterBtn = document.getElementById('filter-btn');
            const horizontalFilters = document.getElementById('horizontal-filters');
            const countTitle = document.getElementById('product-count-title');

            filterBtn.addEventListener('click', () => {
                horizontalFilters.classList.toggle('active');
            });

            // Build category checkboxes
            const categories = [...new Set(products.map(p => p.category))];
            categories.forEach(cat => {
                categoryContainer.innerHTML += `
                    <label><input type="checkbox" name="category" value="${cat}"> ${cat}</label>
                `;
            });

            // Grid & List View Toggle
            const gridViewBtn = document.getElementById('grid-view-btn');
            const listViewBtn = document.getElementById('list-view-btn');

            gridViewBtn.addEventListener('click', () => {
                gridViewBtn.classList.add('active');
                listViewBtn.classList.remove('active');
                grid.classList.remove('list-view');
            });

            listViewBtn.addEventListener('click', () => {
                listViewBtn.classList.add('active');
                gridViewBtn.classList.remove('active');
                grid.classList.add('list-view');
            });

            function renderProducts() {
                const selectedCategories = Array.from(document.querySelectorAll('input[name="category"]:checked')).map(cb => cb.value);
                const selectedTypes = Array.from(document.querySelectorAll('input[name="type"]:checked')).map(cb => cb.value);
                const selectedFlavours = Array.from(document.querySelectorAll('input[name="flavour"]:checked')).map(cb => cb.value);
                const selectedRatings = Array.from(document.querySelectorAll('input[name="rating"]:checked')).map(cb => parseInt(cb.value));
                const sortVal = sortSelect.value;

                let filtered = products.filter(p => {
                    const catMatch = selectedCategories.length === 0 || selectedCategories.includes(p.category);
                    const typeMatch = selectedTypes.length === 0 || selectedTypes.includes(p.type);
                    
                    let flavourMatch = true;
                    if (selectedFlavours.length > 0) {
                        flavourMatch = selectedFlavours.some(flav => {
                            const nameLower = p.name.toLowerCase();
                            const descLower = p.description.toLowerCase();
                            const flavLower = flav.toLowerCase();
                            return nameLower.includes(flavLower) || descLower.includes(flavLower);
                        });
                    }

                    let ratingMatch = true;
                    if (selectedRatings.length > 0) {
                        ratingMatch = selectedRatings.some(r => {
                            if (r === 5) return p.rating === 5;
                            return p.rating >= r;
                        });
                    }

                    return catMatch && typeMatch && flavourMatch && ratingMatch;
                });

                if (sortVal === 'price-low') filtered.sort((a, b) => a.price - b.price);
                else if (sortVal === 'price-high') filtered.sort((a, b) => b.price - a.price);
                else if (sortVal === 'name-asc') filtered.sort((a, b) => a.name.localeCompare(b.name));
                else if (sortVal === 'name-desc') filtered.sort((a, b) => b.name.localeCompare(a.name));

                countTitle.textContent = `Products (${filtered.length})`;

                grid.innerHTML = '';
                if (filtered.length === 0) {
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:40px; color:#777;">No products match your filters.</p>';
                    return;
                }

                filtered.forEach(product => {
                    const priceHtml = product.originalPrice
                        ? `$${product.price.toFixed(2)} <span style="text-decoration:line-through; color:#999; font-size:12px;">$${product.originalPrice.toFixed(2)}</span>`
                        : `$${product.price.toFixed(2)}`;
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.onclick = () => window.location.href = `product-details.html?id=${product.id}`;
                    card.innerHTML = `
                        <div class="product-card-img-wrap">
                            <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                        </div>
                        <div class="product-card-body">
                            <h4 class="product-title">${product.name}</h4>
                            <div class="product-price">${priceHtml}</div> <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                            <div class="stars">
                                ${getStarsHTML(product.rating)}
                                <span class="review-count">| ${product.reviews} Reviews</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            horizontalFilters.addEventListener('change', renderProducts);
            sortSelect.addEventListener('change', renderProducts);
            renderProducts();
        });
    </script>
</body>
</html>
